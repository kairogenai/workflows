name: Update All Containers in Cluster

on:
  workflow_call:
    inputs:
      repository:
        description: 'Image repository URI (without tag)'
        required: true
        type: string
      image_tag:
        description: 'New image tag'
        required: true
        type: string
      cluster:
        description: 'ECS cluster name'
        required: true
        type: string
      aws_region:
        description: 'AWS region'
        required: false
        type: string
        default: 'us-east-1'
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true

jobs:
  update-containers:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: Update Services in Cluster
        id: update-services
        shell: bash
        run: |
          REPOSITORY="${{ inputs.repository }}"
          IMAGE_TAG="${{ inputs.image_tag }}"
          CLUSTER="${{ inputs.cluster }}"

          echo "Listing services in cluster $CLUSTER..."
          services=$(aws ecs list-services --cluster "$CLUSTER" --query 'serviceArns[]' --output text)

          if [ -z "$services" ]; then
            echo "No services found in cluster $CLUSTER."
            exit 0
          fi

          for service_arn in $services; do
            service_name=$(basename "$service_arn")
            echo "Checking service: $service_name"

            task_def_arn=$(aws ecs describe-services --cluster "$CLUSTER" --services "$service_name" --query 'services[0].taskDefinition' --output text)
            task_def_json=$(aws ecs describe-task-definition --task-definition "$task_def_arn" --query 'taskDefinition')

            if echo "$task_def_json" | jq -e ".containerDefinitions[] | select(.image | startswith(\"$REPOSITORY:\"))" > /dev/null; then
              echo "  -> Found matching image in $service_name. Registering new task definition..."

              new_task_def=$(echo "$task_def_json" | jq "
                del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy) |
                .containerDefinitions |= map(
                  if .image | startswith(\"$REPOSITORY:\") then
                    .image = \"$REPOSITORY:$IMAGE_TAG\"
                  else
                    .
                  end
                )
              ")

              new_task_def_arn=$(aws ecs register-task-definition --cli-input-json "$new_task_def" --query 'taskDefinition.taskDefinitionArn' --output text)
              echo "  -> New task definition: $new_task_def_arn"

              aws ecs update-service \
                --cluster "$CLUSTER" \
                --service "$service_name" \
                --task-definition "$new_task_def_arn" \
                --query 'service.serviceName' \
                --output text

              echo "  -> Service $service_name updated to $new_task_def_arn"
            else
              echo "  -> Repository $REPOSITORY not found in $service_name. Skipping."
            fi
          done

          echo ""
          echo "✅ All services updated to $IMAGE_TAG"
