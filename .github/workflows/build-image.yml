name: Build and Push to ECR

on:
  workflow_call:
    inputs:
      repository:
        required: true
        type: string
      image_tag:
        required: true
        type: string
      environment:
        required: false
        type: string
        default: 'production'
      build_args:
        required: false
        type: string
        default: ''
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.environment == 'production' && 'us-east-1' || 'us-east-2' }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          BUILD_ARGS=""
          if [ -n "${{ inputs.build_args }}" ]; then
            while IFS= read -r arg; do
              [ -n "$arg" ] && BUILD_ARGS="$BUILD_ARGS --build-arg $arg"
            done <<< "${{ inputs.build_args }}"
          fi
          docker build $BUILD_ARGS -t ${{ inputs.repository }}:${{ inputs.image_tag }} .

      - name: Push Docker image
        run: |
          docker push ${{ inputs.repository }}:${{ inputs.image_tag }}
