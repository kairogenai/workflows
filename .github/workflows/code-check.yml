name: Code Check

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version'
        required: false
        type: string
        default: '22'
      package-manager:
        description: 'Package manager to use (pnpm or npm)'
        required: false
        type: string
        default: 'pnpm'
      pnpm-version:
        description: 'pnpm version (only used when package-manager is pnpm)'
        required: false
        type: number
        default: 9
      run-lint:
        description: 'Run lint step'
        required: false
        type: boolean
        default: true
      run-test:
        description: 'Run test step'
        required: false
        type: boolean
        default: true
      run-build:
        description: 'Run build step'
        required: false
        type: boolean
        default: true

jobs:
  lint:
    name: Lint
    if: ${{ inputs.run-lint }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        if: ${{ inputs.package-manager == 'pnpm' }}
        uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm-version }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}

      - name: Install dependencies
        run: |
          if [ "${{ inputs.package-manager }}" = "npm" ]; then
            npm ci
          else
            pnpm install --frozen-lockfile
          fi

      - name: Run lint
        run: |
          if [ "${{ inputs.package-manager }}" = "npm" ]; then
            npm run lint
          else
            pnpm run lint
          fi

  test:
    name: Test
    if: ${{ inputs.run-test }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        if: ${{ inputs.package-manager == 'pnpm' }}
        uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm-version }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}

      - name: Install dependencies
        run: |
          if [ "${{ inputs.package-manager }}" = "npm" ]; then
            npm ci
          else
            pnpm install --frozen-lockfile
          fi

      - name: Run tests
        run: |
          if [ "${{ inputs.package-manager }}" = "npm" ]; then
            npm test
          else
            pnpm run test
          fi

  build:
    name: Build
    if: ${{ inputs.run-build }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        if: ${{ inputs.package-manager == 'pnpm' }}
        uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm-version }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}

      - name: Install dependencies
        run: |
          if [ "${{ inputs.package-manager }}" = "npm" ]; then
            npm ci
          else
            pnpm install --frozen-lockfile
          fi

      - name: Build
        run: |
          if [ "${{ inputs.package-manager }}" = "npm" ]; then
            npm run build
          else
            pnpm run build
          fi
